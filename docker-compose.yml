version: "3.9"

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

  backend:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r backend/requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
