services:
  - type: web
    name: trigr-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGINS
        sync: false

  - type: web
    name: trigr-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
